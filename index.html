<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
:root { --p: #00ff6a; --b: #0a0a0a; }
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
    background: var(--b); 
    color: #fff; 
    overflow: hidden; 
}

.main-ui { 
    display: flex; 
    flex-direction: column; 
    justify-content: center;
    height: 100vh; 
    max-width: 900px; 
    margin: 0 auto; 
    padding: 15px; 
}

.video-container { 
    width: 100%; 
    position: relative; 
    padding-top: 56.25%; 
    background: #000; 
    border-radius: 12px; 
    overflow: hidden; 
    border: 1px solid rgba(255,255,255,0.1); 
}

#stream-player { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    border: none; 
}
</style>
</head>

<body>

<div class="main-ui">
  <div class="video-container" id="viewport">
      <iframe 
          id="stream-player"
          src="https://allrounder-live.pages.dev/star/star-1-hindi" 
          allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
          allowfullscreen="true">
      </iframe>
  </div>
</div>

<script>
/* Note: I have removed the "Ad Shield" and "Sandbox" restrictions. 
  This allows the player to load its own scripts and data without interference.
*/
</script>

</body>
</html>
