<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Sports 1 Hindi | Prime</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
:root { --p: #00ff6a; --b: #0a0a0a; }
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
    background: var(--b); 
    color: #fff; 
    overflow: hidden; 
    user-select: none; 
}

.main-ui { 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    max-width: 900px; 
    margin: 0 auto; 
    padding: 15px; 
}

.header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 10px 0; 
}

.logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
.live-tag { 
    background: #ff0000; 
    padding: 4px 12px; 
    border-radius: 4px; 
    font-size: 11px; 
    font-weight: bold; 
    animation: pulse 2s infinite;
}

@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

.video-container { 
    width: 100%; 
    position: relative; 
    padding-top: 56.25%; 
    background: #000; 
    border-radius: 12px; 
    overflow: hidden; 
    border: 1px solid rgba(255,255,255,0.1); 
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

#stream-player { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    border: none; 
}

.status-box {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    font-size: 12px;
    color: #888;
    line-height: 1.4;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="main-ui">
  <div class="header">
    <div class="logo">STAR <span style="color:var(--p)">SPORTS 1 HINDI</span></div>
    <div class="live-tag">LIVE</div>
  </div>

  <div class="video-container" id="viewport">
      </div>

  <div class="status-box">
      <b>Secure Stream:</b> Ads and popups are restricted. <br>
      <i>If the video fails to load, please refresh the page.</i>
  </div>
</div>

<script>
// Encoded Prime Source
const _0xP1 = "aHR0cHM6Ly9hbGxyb3VuZGVyZnVjay52ZXJjZWwuYXBwL2NoYW5uZWwvcHJpbWUuaHRtbA==";

window.onload = function() {
    const now = new Date();
    // Expiry Check (March 9, 2026)
    const expiry = new Date(2026, 2, 9, 6, 0, 0);

    if (now >= expiry) {
        document.getElementById('viewport').innerHTML = "<div style='text-align:center;padding-top:20px;'>Link Expired</div>";
        return;
    }

    const src = atob(_0xP1);
    const viewport = document.getElementById('viewport');
    
    // Balanced Sandbox: Fixes "Failed to load" while blocking popups
    viewport.innerHTML = `
        <iframe 
            id="stream-player"
            src="${src}" 
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allowfullscreen="true" 
            referrerpolicy="no-referrer">
        </iframe>
    `;
};

// Anti-DevTools shortcuts
document.onkeydown = (e) => {
    if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
};
</script>

</body>
</html>
