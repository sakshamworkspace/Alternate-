<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
:root { --p: #00ff6a; --b: #0a0a0a; }
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
    background: var(--b); 
    color: #fff; 
    overflow: hidden; 
    user-select: none; 
}

.main-ui { 
    display: flex; 
    flex-direction: column; 
    justify-content: center;
    height: 100vh; 
    max-width: 900px; 
    margin: 0 auto; 
    padding: 15px; 
}

.video-container { 
    width: 100%; 
    position: relative; 
    padding-top: 56.25%; 
    background: #000; 
    border-radius: 12px; 
    overflow: hidden; 
    border: 1px solid rgba(255,255,255,0.1); 
}

#stream-player { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    border: none; 
}

/* AD-KILLER SHIELD: Intercepts ad-triggering clicks */
#ad-shield {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 999;
    background: rgba(0,0,0,0);
    cursor: pointer;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="main-ui">
  <div class="video-container" id="viewport">
      <div id="ad-shield" title="Click twice to play"></div>
      </div>
</div>

<script>
/**
 * Target URL: https://allrounder-live.pages.dev/star/star-1-hindi
 */
const _0xV1 = "aHR0cHM6Ly9hbGxyb3VuZGVyLWxpdmUucGFnZXMuZGV2L3N0YXIvc3Rhci0xLWhpbmRp";

window.onload = function() {
    const viewport = document.getElementById('viewport');
    const shield = document.getElementById('ad-shield');
    const src = atob(_0xV1);

    // FIX FOR ERRORS:
    // We remove the sandbox attribute entirely to stop "Disable Sandbox" messages.
    // We allow-top-navigation to prevent "Access Denied" crashes.
    viewport.innerHTML += `
        <iframe 
            id="stream-player"
            src="${src}" 
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
            allowfullscreen="true">
        </iframe>
    `;

    // AD PROTECTION LOGIC:
    // The shield catches the first 2 clicks (which are usually invisible ads).
    let clickCount = 0;
    shield.onclick = function(e) {
        clickCount++;
        // On the second click, we remove the shield so you can control the video.
        if (clickCount >= 2) {
            shield.style.display = 'none';
        }
    };
};

/* Prevent keyboard shortcuts to view source */
document.onkeydown = (e) => {
    if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
        return false;
    }
};
</script>

</body>
</html>
